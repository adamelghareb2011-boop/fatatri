<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fatatri - Home</title>
<style>
    /* 1. Viewport/Body Fixes */
    body { 
        font-family: 'Segoe UI', sans-serif; 
        margin: 0; padding: 0; 
        background-image: url('bg_pattern.jpg'); 
        background-repeat: repeat; 
        /* Change 300px to 400px or 500px to make the pattern image bigger */
        background-size: 300px; 
        background-attachment: fixed;
    }

    /* 2. Mobile Friendly Navigation */
    nav { 
        display: flex; flex-wrap: wrap; gap: 15px; 
        padding: 15px; background: rgba(255, 255, 255, 0.9); 
        backdrop-filter: blur(10px); justify-content: center; 
        border-bottom: 1px solid #ddd;
    }
    nav a { text-decoration: none; color: #333; font-weight: 600; font-size: 16px; }

    /* 3. The "Glass" Container that fits mobile */
    .glass-card, .content { 
        background: rgba(255, 255, 255, 0.95); 
        padding: 30px; 
        margin: 20px auto; 
        width: 90%;          /* Uses 90% of the phone screen width */
        max-width: 500px;    /* Keeps it from getting too wide on desktop */
        border-radius: 20px; 
        box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        box-sizing: border-box; /* Crucial to prevent padding overflow */
    }

    /* 4. Responsive Images */
    .showcase-img, .inside-photo { 
        width: 100%; 
        border-radius: 15px; 
        margin: 15px 0; 
    }
</style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="order.html">Order Online</a>
        <a href="reservations.html">Reservations</a>
    </nav>
    <div class="content">
        <img src="logo.png" class="logo" alt="Fatatri Logo">
        <h1>Welcome to Fatatri</h1>
        <img src="food.png" class="showcase-img" alt="Our Delicious Food">
        <p class="quote">"Every bite tells a story of tradition; from our kitchen to your table, experience the true soul of authentic Egyptian flavors."</p>
        <img src="look.png" class="showcase-img" alt="Fatatri Store">
        <div class="contact-info">
            <h3>Contact & Location</h3>
            <p>📍 Al Amir St, Doha, Qatar</p>
            <p>📞 Phone: 50584446</p>
        </div>
    </div>
</body>
</html>
