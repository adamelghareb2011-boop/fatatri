<!DOCTYPE html>
<html lang="en">
<head>

    <title>Fatatri - Order</title>

    <style>
        body {

            background-attachment: fixed;
        }

        nav {
            display: flex;

            gap: 15px;

            padding: 30px;

            max-width: 500px;
            border-radius: 20px;

            text-align: center;
        }

            margin-top: 0;
            margin-bottom: 25px;

            border: none;
            border-radius: 10px;
