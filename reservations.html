<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fatatri - Reservations</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function(){
            emailjs.init("XUwvmjA_7bZZHo_gd"); 
        })();
    </script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-image: url('bg_pattern.jpg'); background-repeat: repeat; background-attachment: fixed; }
        nav { display: flex; gap: 20px; padding: 20px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); justify-content: center; border-bottom: 1px solid #ddd; }
        nav a { text-decoration: none; color: #333; font-weight: 600; }
        .glass-card { background: rgba(255, 255, 255, 0.95); padding: 30px; margin: 30px auto; max-width: 450px; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); text-align: center; }
        .inside-photo { width: 100%; border-radius: 15px; margin-bottom: 20px; object-fit: cover; }
        .input-field { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 15px; background: #d35400; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .address-box { margin-top: 20px; font-size: 0.9rem; color: #444; border-top: 1px solid #eee; padding-top: 15px; }
        @media (max-width: 600px) {
            nav { flex-direction: column; align-items: center; gap: 10px; }
            .glass-card { margin: 15px; padding: 20px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="order.html">Order Online</a>
        <a href="reservations.html">Reservations</a>
    </nav>

    <div class="glass-card">
        <img src="inside.png" alt="Our Restaurant" class="inside-photo">
        <h1>Book a Table</h1>
        <form id="reservation-form">
            <input type="text" name="user_name" placeholder="Name" required class="input-field">
            <input type="text" name="user_phone" placeholder="Phone" required class="input-field">
            <input type="date" name="date" required class="input-field">
            <button type="submit" class="submit-btn" id="button">Confirm Reservation</button>
        </form>
        <div class="address-box">
            <p><strong>📍 Visit Us:</strong> Al Amir St, Doha, Qatar</p>
            <p>📞 50584446</p>
        </div>
    </div>

    <script>
        const btn = document.getElementById('button');
        document.getElementById('reservation-form').addEventListener('submit', function(event) {
            event.preventDefault();
            btn.value = 'Sending...';

            emailjs.sendForm('service_ad2wglg', 'template_cnhsdur', this)
                .then(function() {
                    btn.value = 'Confirm Reservation';
                    alert('Reservation Sent Successfully!');
                }, function(error) {
                    btn.value = 'Confirm Reservation';
                    alert('Failed to send. Please try again.');
                });
        });
    </script>
</body>
</html>
